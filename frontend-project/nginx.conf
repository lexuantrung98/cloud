# ============================================
# Nginx Configuration for Collab Frontend
# Optimized with security headers, gzip, caching
# Now routing through API Gateway (Ocelot)
# ============================================

# API Gateway - Single entry point for all backend services
upstream api_gateway {
    server api-gateway:5100;
    keepalive 32;
}

# Keep individual upstreams for fallback/direct access if needed
upstream communication_service {
    server communication-service:5015;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    # ==========================================
    # Security Headers
    # ==========================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==========================================
    # Gzip Compression
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # ==========================================
    # Static Files & SPA
    # ==========================================
    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Static assets with aggressive caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing - try files first, fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
        
        # Disable caching for HTML
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ==========================================
    # API Proxy Configuration - via API GATEWAY
    # ==========================================
    
    # Common proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;

    # ------------------------------------------
    # Account Service (/api/auth) → API Gateway
    # ------------------------------------------
    location /api/auth {
        proxy_pass http://api_gateway/api/account/auth;
    }

    # ------------------------------------------
    # Course Service (/api/subjects, /api/syllabuses, /api/classes, /api/groups)
    # → API Gateway
    # ------------------------------------------
    location /api/subjects {
        proxy_pass http://api_gateway/api/course/subjects;
    }

    location /api/syllabuses {
        proxy_pass http://api_gateway/api/course/syllabuses;
    }

    location /api/classes {
        proxy_pass http://api_gateway/api/course/classes;
    }

    location /api/groups {
        proxy_pass http://api_gateway/api/course/groups;
    }

    # ------------------------------------------
    # Project Service - All APIs → API Gateway
    # ------------------------------------------
    location /api/ProjectTemplates {
        proxy_pass http://api_gateway/api/project/ProjectTemplates;
        client_max_body_size 100M;
        proxy_request_buffering off;
    }
    
    location /api/ProjectGroups {
        proxy_pass http://api_gateway/api/project/ProjectGroups;
        client_max_body_size 50M;
    }
    
    location /api/ProjectTasks {
        proxy_pass http://api_gateway/api/project/ProjectTasks;
    }
    
    location /api/ProjectSubmissions {
        proxy_pass http://api_gateway/api/project/ProjectSubmissions;
        client_max_body_size 100M;
        proxy_request_buffering off;
    }
    
    location /api/GroupMilestones {
        proxy_pass http://api_gateway/api/project/GroupMilestones;
    }
    
    location /api/projects {
        proxy_pass http://api_gateway/api/project/projects;
        client_max_body_size 100M;
        proxy_request_buffering off;
    }

    # ------------------------------------------
    # Communication Service APIs → API Gateway
    # Catchall route for all communication endpoints
    # ------------------------------------------
    location /api/communication {
        proxy_pass http://api_gateway/api/communication;
        # Disable caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Legacy specific routes (will be matched before catchall if more specific)
    location /api/Chat {
        proxy_pass http://api_gateway/api/communication/Chat;
    }

    location /api/Meeting {
        proxy_pass http://api_gateway/api/communication/Meeting;
    }

    location /api/AI {
        proxy_pass http://api_gateway/api/AI;
    }

    location /api/File {
        proxy_pass http://api_gateway/api/communication/File;
        client_max_body_size 50M;
    }

    location /api/ChatList {
        proxy_pass http://api_gateway/api/communication/ChatList;
    }

    location /api/Notification {
        proxy_pass http://api_gateway/api/communication/Notification;
    }

    location /api/Notifications {
        proxy_pass http://api_gateway/api/communication/Notifications;
    }

    # ------------------------------------------
    # SignalR WebSocket - Direct to service (not via Gateway)
    # WebSocket requires direct connection for now
    # ------------------------------------------
    location /chatHub {
        proxy_pass http://communication_service/chatHub;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /meetingHub {
        proxy_pass http://communication_service/meetingHub;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ==========================================
    # Error Pages
    # ==========================================
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
